<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login Form</title>
        <link rel="stylesheet" href="./dist/styles.css" />
        <!-- <link rel="stylesheet" href="./css/plugin.css"> -->
        <link rel="shortcut icon" href="./img/lock.svg" type="image/x-icon">
    </head>
    <body>
        <header class="
        bg-blue-400
        py-3
        sm:py-0
        relative
        ">
            <div class="container mx-auto w-3/4 flex justify-between">
                <a class="
                flex
                items-center
                font-semibold
                text-2xl
                text-white
                " href="./index.html"><img class="w-6 pr-2" src="img/lock.svg" alt=""> Scured Area</a>

                <nav class="">
                    <button id="mobile_icon" class="text-white text-end flex sm:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="size-6"
                        class="w-7 h-7">
                        <path strokeLinecap="round" strokeLinejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                        </svg>
                    </button>
                    <ul id="main_menu" class="absolute bg-blue-400 w-full left-0 top-10 p-4 text-center hidden sm:block sm:relative sm:top-0 sm:flex sm:justify-evenly sm:items-center">
                        <li class="mb-2 sm:mb-0 sm:ml-3"><a class="text-white font-semibold" href="">Home</a></li>
                        <li class="mb-2 sm:mb-0 sm:ml-3"><a class="text-white font-semibold" href="">Contact</a></li>
                        <li class="mb-2 sm:mb-0 sm:ml-3"><a class="text-white font-semibold" href="">Login</a></li>
                        <li class="mb-2 sm:mb-0 sm:ml-3"><a class="text-white font-semibold bg-blue-900 px-3 py-3 block pb-4 rounded" href="">Sign in</a></li>
                    </ul>
                </nav>
            </div>
        </header>

        <section class="bg-blue-100 h-screen">
            <div class="container mx-auto w-3/4 flex justify-between flex-col sm:flex-row sm:h-full sm:items-center">
                <div class="order-2 bg-white py-8 rounded-lg sm:order-1 sm:w-1/2 sm:text-center">
                    <h3 class="text-3xl font-bold mb-1">Welcome  Back</h3>
                    <p class="text-gray-500 mb-5">Please enter your details</p>
                    <form action="">
                        <label class="font-semibold mb-1 block sm:text-left" for="email">Email Address</label>
                        <input class="border w-full p-2 mb-2 rounded-lg " type="email" placeholder="Enter Your Email Address">
                        <label class="font-semibold mb-1 block sm:text-left" for="password">Password</label>
                        <input class="border w-full p-2 mb-3 rounded-lg " type="password" placeholder="Enter your Password">
                        <input class="text-white font-semibold bg-blue-900 px-3 py-2 block pb-3 rounded-lg w-full cursor-pointer hover:bg-black mb-4" type="submit" value="Sign In">
                    </form>
                    <p class="text-gray-400 text-sm">Don't have an account? <a class="text-blue-500 underline"  href="#">Sign up</a></p>
                </div>
                <div class="order-1 py-8 sm:order-2 sm:w-1/2 sm:flex sm:items-center sm:pl-5">
                    <img src="./img/login.svg" alt="">
                </div>
            </div>
        </section>
        <script src="./scripts.js" type="module"></script>
    </body>
</html>
